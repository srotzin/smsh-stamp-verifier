name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Smoke-test CLI (valid receipt with test keypair)
        run: |
          PUBKEY=$(node -e "const f=require('fs');const kp=JSON.parse(f.readFileSync('tests/fixtures/test_keypair.json','utf8'));process.stdout.write(kp.pubKeyB64u);")
          SMSH_PUBKEY="$PUBKEY" node dist/cli.js tests/fixtures/valid_llm_call.json

      - name: Upload coverage report
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
